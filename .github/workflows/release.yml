name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Git ref/commit to build"
        required: true
        default: "main"
      release_tag:
        description: "Release tag to upload asset to (e.g. v1.0.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Ensure release secrets exist
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Decode Android keystore
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-signing-key.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Sign release APK (v1 only)
        run: |
          UNSIGNED_APK=$(ls app/build/outputs/apk/release/*-unsigned.apk | head -n 1)
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n 1)
          "$APKSIGNER" sign \
            --ks android-signing-key.jks \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled false \
            --v3-signing-enabled false \
            --v4-signing-enabled false \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

      - name: Prepare versioned APK name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          APK_VERSION="${TAG#v}"
          SRC_APK="app/build/outputs/apk/release/app-release.apk"
          DEST_APK="app/build/outputs/apk/release/swap-v${APK_VERSION}-release.apk"
          cp "$SRC_APK" "$DEST_APK"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "RELEASE_APK=$DEST_APK" >> $GITHUB_ENV

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: swap-release-${{ github.ref_name }}
          path: ${{ env.RELEASE_APK }}
          if-no-files-found: error

      - name: Publish GitHub Release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_APK" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_APK" --title "Swap $RELEASE_TAG" --generate-notes
          fi
